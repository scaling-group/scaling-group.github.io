# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: Scientific Computing and Intelligence Group
email: yangliu@nus.edu.sg
description: > # this means to ignore newlines until "baseurl:"
  Scientific Computing and Intelligence Group at NUS, led by Liu Yang (Yang Liu, 杨柳), centered on in-context operator networks (ICON) and in-context operator learning, with work on multi-physics prediction, physical modeling, embodied AI, and agents for automated discovery of algorithms.
baseurl: ""
url: "https://scaling-group.github.io"
seo:
  person_name: "Liu Yang"
  alternate_names:
    - "Yang Liu"
    - "杨柳"
  role: "Assistant Professor"
  affiliation: "National University of Singapore"
  scholar_url: "https://scholar.google.com/citations?user=3qRUYIYAAAAJ&hl=en"
  cv_url: "/downloads/cv/liuyang.pdf"
  keywords: "Liu Yang, Yang Liu, 杨柳, ICON, In-Context Operator Networks, in-context operator learning, scientific computing, scientific machine learning, operator learning, NUS"

include:
  - .htaccess
  - _pages

collections:
  blogs:
    output: true
    permalink: /blogs/:name/

sass:
  sass_dir: _sass

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false



# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  parse_block_html: true # default for kramdown is false. This will enable using Markdown links
