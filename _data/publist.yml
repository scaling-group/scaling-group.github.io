- title: "Evolutionary Ensemble of Agents"
  image: eve-demo.gif
  image2: eve-overview.png
  description: "We introduce Evolutionary Ensemble (EvE), a decentralized framework that organizes existing, highly capable coding agents into a co-evolving system for algorithmic discovery. Rather than reinventing the wheel, EvE fixes the base agent substrate and focuses entirely on evolving the guidance and skills that dictate agent behaviors. When applied to a research bottleneck in In-Context Operator Networks (ICON), EvE autonomously discovered a robust mechanism that enables reliable context length generalization."
  authors: "Zongmin Yu, Liu Yang<sup>†</sup>"
  link:
    url: https://arxiv.org/abs/2605.09018
    display: arXiv, May 2026
  github: https://github.com/scaling-group/eve
  highlight: 1

- title: "In-context modeling as a retrain-free paradigm for foundation models in computational science"
  image: icm-hyperelastic.png
  description: We introduce In-Context Modeling (ICM), a retrain-free paradigm that infers physical relationships directly from observational fields. Rather than encoding system-specific behavior in fixed parameters, ICM assimilates measurements as physical context and performs inference through a single forward pass. Trained in a physics-informed, label-free manner using governing equations, a single model generalizes across unseen materials, geometries, and loading conditions.
  authors: "Lingfeng Li<sup>*</sup>, Zhuoyuan Li<sup>*</sup>, Shun Li<sup>*</sup>, Kaixin Zhan, Huajian Gao<sup>†</sup>, Changqing Chen<sup>†</sup>, Liu Yang<sup>†</sup>"
  link:
    url: https://arxiv.org/abs/2604.23098
    display: arXiv, Apr 2026
  highlight: 1

